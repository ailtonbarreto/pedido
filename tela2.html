<!DOCTYPE html>
<html lang="pt">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pesquisa</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      flex-direction: column;
      align-items: center;
      height: 100vh;
      background-color: #f0f0f0;
      overflow: hidden;
      font-family: sans-serif;
    }

    h2 {
      color: #053568;
    }

    .container {
      display: flex;
      height: 100%;
      height: 70%;
      justify-content: center;
      align-items: center;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      border: none;
      background-color: #007bff;
      color: #fff;
      border-radius: 5px;
      transition: all 0.2s ease;
    }

    #botao-nao {
      position: absolute;
      top: 20px;
      background-color: rgb(49, 216, 7);
      left: calc(50% - 120px);
    }

    #botao-sim {
      position: absolute;
      background-color: rgb(243, 6, 6);
      top: 20px;
      left: calc(50% + 20px);
    }

    img{
        width: 80%;
    }

  </style>
</head>

<body>

  <h2>Obrigado por aceitar</h2>

  <div class="container">

    <img src="./smile.png" alt="">

    
  </div>

  <!-- <h2>Enviar Mensagem</h2> -->

  

</body>

</html>
